<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d1a" />
  <meta name="description" content="Dice Forge — a 3D tabletop dice simulator with Warhammer 40K and Underworlds support" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dice Forge" />
  <link rel="manifest" href="manifest.json" />
  <title>Dice Forge — Tabletop Dice Simulator</title>
</head>
<body>
  <div id="app" class="app-shell">

    <!-- ── TOP BAR ── -->
    <header class="top-bar" role="banner">
      <h1 class="app-title"><span class="app-title-glyph" aria-hidden="true">⚔</span> Dice Forge</h1>
      <div class="top-actions">
        <button id="btn-stats" class="icon-btn" aria-label="Toggle stats panel" aria-pressed="false">📊</button>
        <button id="btn-presets" class="icon-btn" aria-label="Toggle presets panel" aria-pressed="false">📋</button>
        <button id="btn-audio" class="icon-btn" aria-label="Toggle sound" aria-pressed="true">🔊</button>
        <button id="btn-theme" class="icon-btn" aria-label="Toggle light/dark theme">🌙</button>
      </div>
    </header>

    <!-- ── PANELS ── -->
    <aside id="panel-stats" class="side-panel" role="complementary" aria-label="Statistics" hidden>
      <div class="panel-header">
        <h2>📊 Session Stats</h2>
        <button class="icon-btn panel-close" data-panel="stats" aria-label="Close stats panel">✕</button>
      </div>
      <div id="stats-content" class="stats-content" aria-live="polite"></div>
    </aside>

    <aside id="panel-presets" class="side-panel" role="complementary" aria-label="Presets" hidden>
      <div class="panel-header">
        <h2>📋 Presets</h2>
        <button class="icon-btn panel-close" data-panel="presets" aria-label="Close presets panel">✕</button>
      </div>
      <div id="presets-content" class="presets-content" aria-live="polite"></div>
      <div class="preset-save-row">
        <input id="preset-name-input" class="preset-name-input" type="text" placeholder="Preset name…" aria-label="New preset name" maxlength="40" />
        <button id="btn-save-preset" class="secondary-btn" aria-label="Save current pool as preset">Save</button>
      </div>
    </aside>

    <!-- ── MAIN CONTENT ── -->
    <main class="main-content" role="main">

      <!-- Die Pool Builder -->
      <section class="pool-builder" aria-label="Dice pool builder">
        <h2 class="section-label">Dice Pool</h2>
        <div class="die-chips" id="die-chips" role="toolbar" aria-label="Add dice to pool">
          <button class="die-chip" data-die="D4"  aria-label="Add D4">D4</button>
          <button class="die-chip" data-die="D6"  aria-label="Add D6">D6</button>
          <button class="die-chip" data-die="D8"  aria-label="Add D8">D8</button>
          <button class="die-chip" data-die="D10" aria-label="Add D10">D10</button>
          <button class="die-chip" data-die="D12" aria-label="Add D12">D12</button>
          <button class="die-chip" data-die="D20" aria-label="Add D20">D20</button>
          <button class="die-chip" data-die="D100" aria-label="Add D100">D%</button>
          <button class="die-chip" data-die="D3"  aria-label="Add D3">D3</button>
          <button class="die-chip die-chip--custom" data-die="Custom" aria-label="Add custom die">Custom</button>
          <button class="die-chip die-chip--uw-atk" data-die="UW_ATK" aria-label="Add Underworlds Attack die">⚔ UW Atk</button>
          <button class="die-chip die-chip--uw-def" data-die="UW_DEF" aria-label="Add Underworlds Defence die">🛡 UW Def</button>
          <button class="die-chip die-chip--uw-mag" data-die="UW_MAG" aria-label="Add Underworlds Magic die">✦ UW Mag</button>
        </div>

        <!-- Custom die input (hidden by default) -->
        <div id="custom-die-row" class="custom-die-row" hidden>
          <label for="custom-sides" class="sr-only">Number of sides for custom die</label>
          <input id="custom-sides" type="number" min="2" max="1000" value="6" class="custom-sides-input" aria-label="Custom die sides" />
          <button id="btn-add-custom" class="secondary-btn" aria-label="Add custom die to pool">Add D<span id="custom-label">6</span></button>
          <button id="btn-cancel-custom" class="icon-btn" aria-label="Cancel custom die">✕</button>
        </div>

        <!-- Pool display -->
        <div id="pool-display" class="pool-display" aria-label="Current dice pool" aria-live="polite"></div>

        <!-- Threshold / success target (for WH-style rolling) -->
        <div class="threshold-row">
          <label for="threshold-input" class="threshold-label">Success on</label>
          <select id="threshold-input" class="threshold-select" aria-label="Success threshold">
            <option value="0">— none —</option>
            <option value="2">2+</option>
            <option value="3">3+</option>
            <option value="4">4+</option>
            <option value="5">5+</option>
            <option value="6">6+</option>
          </select>
        </div>
      </section>

      <!-- WH40K Helpers -->
      <section class="wh40k-helpers" aria-label="Warhammer 40K helpers">
        <details class="helper-accordion">
          <summary class="helper-summary">⚙ WH40K Helpers</summary>
          <div class="helper-body">
            <!-- Wound chart -->
            <fieldset class="helper-group">
              <legend>Wound Chart</legend>
              <div class="helper-inputs">
                <label for="wh-strength">Strength
                  <input id="wh-strength" type="number" min="1" max="20" value="4" class="wh-input" />
                </label>
                <label for="wh-toughness">Toughness
                  <input id="wh-toughness" type="number" min="1" max="20" value="4" class="wh-input" />
                </label>
              </div>
              <div id="wound-result" class="helper-result" aria-live="polite"></div>
            </fieldset>
            <!-- Save throw -->
            <fieldset class="helper-group">
              <legend>Save Throw</legend>
              <div class="helper-inputs">
                <label for="wh-save">Armour Save
                  <input id="wh-save" type="number" min="2" max="6" value="3" class="wh-input" />
                </label>
                <label for="wh-ap">AP
                  <input id="wh-ap" type="number" min="-6" max="0" value="0" class="wh-input" />
                </label>
                <label for="wh-invuln">Invuln (0=none)
                  <input id="wh-invuln" type="number" min="0" max="6" value="0" class="wh-input" />
                </label>
              </div>
              <div id="save-result" class="helper-result" aria-live="polite"></div>
            </fieldset>
          </div>
        </details>
      </section>

      <!-- Dice Tray -->
      <section class="dice-tray-section" aria-label="Dice tray">
        <div id="dice-tray" class="dice-tray" role="region" aria-label="Dice roll results" aria-live="polite">
          <canvas id="dice-3d-canvas" class="dice-3d-canvas" aria-hidden="true"></canvas>
          <canvas id="particle-canvas" class="particle-canvas" aria-hidden="true"></canvas>
          <div id="results-container" class="results-container" aria-label="Dice results (accessible)"></div>
          <p id="tray-placeholder" class="tray-placeholder">Build your pool above and roll!</p>
        </div>
        <!-- Summary bar -->
        <div id="roll-summary" class="roll-summary" aria-live="polite" hidden></div>
      </section>

    </main>

    <!-- ── BOTTOM ACTION BAR ── -->
    <footer class="action-bar" role="contentinfo">
      <button id="btn-clear" class="secondary-btn" aria-label="Clear dice pool">Clear</button>
      <button id="btn-roll" class="roll-btn" aria-label="Roll all dice" aria-keyshortcuts="Space Enter">
        <span class="roll-btn-text">ROLL</span>
        <span class="roll-btn-sub" aria-hidden="true">shake or space</span>
      </button>
      <button id="btn-reroll" class="secondary-btn" aria-label="Re-roll selected dice" disabled>Re-roll ★</button>
    </footer>

    <!-- ── HISTORY DRAWER ── -->
    <div id="history-drawer" class="history-drawer" role="complementary" aria-label="Roll history">
      <button id="history-handle" class="history-handle" aria-expanded="false" aria-controls="history-list">
        <span class="handle-bar" aria-hidden="true"></span>
        <span class="handle-label">History</span>
      </button>
      <div id="history-list" class="history-list" role="list" aria-label="Previous rolls"></div>
      <button id="btn-clear-history" class="text-btn" aria-label="Clear roll history">Clear history</button>
    </div>

    <!-- ── TOAST ── -->
    <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true" hidden></div>

  </div><!-- /#app -->

  <script type="module" src="/src/main.js"></script>
</body>
</html>
